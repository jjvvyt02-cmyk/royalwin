name: Royalwin Telegram Bot

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install packages
        run: npm install

      - name: Run Bot
        env:
          FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
        run: node bot.js
