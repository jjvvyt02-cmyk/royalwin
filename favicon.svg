  <!-- Three gems on crown -->
  <circle cx="32" cy="22" r="3" fill="#e02020"/>
  <circle cx="18" cy="32" r="2.5" fill="#e02020"/>
  <circle cx="46" cy="32" r="2.5" fill="#e02020"/>
</svg>
