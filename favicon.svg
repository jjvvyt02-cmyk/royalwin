  <rect width="64" height="64" rx="12" fill="#0a0a0f"/>
  <!-- Gold crown -->
  <polygon points="8,44 14,24 24,36 32,18 40,36 50,24 56,44" fill="#f0c040" stroke="#c07a10" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Crown base bar -->
